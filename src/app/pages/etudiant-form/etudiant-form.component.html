 <div class="card m-3">
      <h5 class="card-header">{{ isEditMode ? 'Modifier' : 'Ajouter' }} un étudiant</h5>
      <div class="card-body">
          <form [formGroup]="etudiantForm" (ngSubmit)="onSubmit()">
                <div>
                  <label>Nom</label>
                  <input type="text" formControlName="nom" class="form-control"
                      [ngClass]="{ 'is-invalid': submitted && form['nom'].errors }" />
                  @if (submitted && form['nom'].errors) {
                      <div class="invalid-feedback">Le nom est requis</div>
                  }
              </div>

              <div class="form-group">
                  <label>Prénom</label>
                  <input type="text" formControlName="prenom" class="form-control"
                      [ngClass]="{ 'is-invalid': submitted && form['prenom'].errors }" />
                  @if (submitted && form['prenom'].errors) {
                      <div class="invalid-feedback">Le prénom est requis</div>
                  }
              </div>

              <div class="form-group">
                  <label>Email</label>
                  <input type="email" formControlName="email" class="form-control"
                      [ngClass]="{ 'is-invalid': submitted && form['email'].errors }" />
                  @if (submitted && form['email'].errors) {
                      <div class="invalid-feedback">Email valide requis</div>
                  }
              </div>

              <div class="form-group">
                  <label>Téléphone</label>
                  <input type="text" formControlName="telephone" class="form-control" />
              </div>

              @if (errorMessage) {
                  <div class="alert alert-danger">{{ errorMessage }}</div>
              }

              <div class="text-center">
                  <button class="btn btn-primary" [disabled]="loading">
                      {{ isEditMode ? 'Modifier' : 'Créer' }}
                  </button>
                  <a routerLink="/etudiants" class="btn btn-secondary">Annuler</a>
              </div>
          </form>
      </div>
  </div>
